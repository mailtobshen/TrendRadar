app:
  timezone: Asia/Shanghai
  show_version_update: true
schedule:
  enabled: true
  preset: morning_evening
platforms:
  enabled: true
  sources:
  - id: toutiao
    name: 今日头条
  - id: baidu
    name: 百度热搜
  - id: wallstreetcn-hot
    name: 华尔街见闻
  - id: thepaper
    name: 澎湃新闻
  - id: bilibili-hot-search
    name: bilibili 热搜
  - id: cls-hot
    name: 财联社热门
  - id: ifeng
    name: 凤凰网
  - id: tieba
    name: 贴吧
  - id: weibo
    name: 微博
  - id: douyin
    name: 抖音
  - id: zhihu
    name: 知乎
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
  - id: hacker-news
    name: Hacker News
    url: https://hnrss.org/frontpage
  - id: ruanyifeng
    name: 阮一峰的网络日志
    url: http://www.ruanyifeng.com/blog/atom.xml
    enabled: false
  - id: yahoo-finance
    name: 雅虎财经
    url: https://finance.yahoo.com/news/rssindex
  - id: scmp
    name: 南华早报
    url: https://feedx.net/rss/scmp.xml
    enabled: true
  - id: asahi
    name: 朝日新闻
    url: http://rss.asahi.com/rss/asahi/newsheadlines.rdf
    enabled: true
  - id: BBC
    name: BBC
    url: http://feeds.bbci.co.uk/news/rss.xml
    enabled: true
  - id: nytimes
    name: 纽约时报
    url: https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml
    enabled: true
  - id: washingtonpost
    name: 华盛顿邮报
    url: http://feeds.washingtonpost.com/rss/world
    enabled: true
  - id: foxnews
    name: 福克斯新闻
    url: http://feeds.foxnews.com/foxnews/latest
    enabled: true
  - id: Github
    name: Github
    url: https://github.blog/feed/
  - id: Huggingface
    name: 抱抱脸
    url: https://huggingface.co/blog/feed.xml
  - id: RFI
    name: 法国国际广播
    url: https://feedx.net/rss/rfi.xml
    enabled: true
  - id: AI-Era
    name: 新智元
    url: https://plink.anyfeeder.com/weixin/AI_era
  - id: CNA
    name: 中央社
    url: https://rsshub.rssforever.com/cna
  - id: DeutscheWelle
    name: 德国之声
    url: https://rsshub.rssforever.com/dw/news
  - id: Reuters
    name: 路透社
    url: https://ir.thomsonreuters.com/rss/news-releases.xml
    enabled: true
  - id: economist
    name: 经济学人
    url: https://plink.anyfeeder.com/weixin/theeconomist
  - id: ltn
    name: 自由时报
    url: https://news.ltn.com.tw/rss/all.xml
    enabled: true
  - id: zaobao
    name: 联合早报
    url: https://plink.anyfeeder.com/zaobao/realtime/china
report:
  mode: current
  display_mode: keyword
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0
filter:
  method: ai
  priority_sort_enabled: true
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: prompt.txt
  extract_prompt_file: extract_prompt.txt
  update_tags_prompt_file: update_tags_prompt.txt
display:
  region_order:
  - new_items
  - hotlist
  - rss
  - standalone
  - ai_analysis
  regions:
    hotlist: true
    new_items: true
    rss: true
    standalone: true
    ai_analysis: true
  standalone:
    platforms:
    - wallstreetcn-hot
    rss_feeds: []
    max_items: 20
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ''
    dingtalk:
      webhook_url: ''
    wework:
      webhook_url: ''
      msg_type: markdown
    telegram:
      bot_token: ''
      chat_id: ''
    email:
      from: ''
      password: ''
      to: ''
      smtp_server: ''
      smtp_port: ''
    ntfy:
      server_url: https://ntfy.sh
      topic: ''
      token: ''
    bark:
      url: ''
    slack:
      webhook_url: ''
    generic_webhook:
      webhook_url: ''
      payload_template: ''
storage:
  backend: auto
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: output
    retention_days: 0
  remote:
    endpoint_url: ''
    bucket_name: ''
    access_key_id: ''
    secret_access_key: ''
    region: ''
    retention_days: 0
  pull:
    enabled: false
    days: 7
ai:
  model: ollama/qwen3.5-opus:9b
  api_key: ollama-local
  api_base: http://172.25.128.1:11434
  timeout: 120
  temperature: 1
  max_tokens: 5000
  num_retries: 1
  fallback_models: []
  extra_params: {}
ai_analysis:
  enabled: true
  language: Chinese
  prompt_file: ai_analysis_prompt.txt
  mode: follow_report
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true
ai_translation:
  enabled: true
  language: 中文
  prompt_file: ai_translation_prompt.txt
  scope:
    hotlist: false
    rss: true
    standalone: true
tags:
  mode: manual
  items:
  - name: 科技巨头
    description: 华为、腾讯、字节跳动、京东、鸿蒙、海思、昇腾、抖音、微信等公司战略、组织、产品、资本与监管；苹果、微软、谷歌、Anthropic、OpenAI 财报、发布会、产品路线、合作竞争
  - name: 大模型 AI 产品
    description: OpenAI、Claude、ChatGPT、Sora、DALL-E、Qwen、MiniMax、GLM 、DeepSeek、Kimi等模型能力、开源策略、生态竞争
  - name: 芯片半导体及云算力基础设施
    description: 芯片、半导体、光刻机、先进封装、国产替代、关键材料设备、供应安全；英伟达、AMD、华为算力、CUDA、Azure、Google Cloud 的算力供给、推理成本、训练效率、供应链
  - name: 智能汽车自动驾驶
    description: 比亚迪、特斯拉、FSD、无人驾驶、智驾、刀片电池、云辇、销量、定价、出海
  - name: 机器人具身智能
    description: 宇树、智元、众擎、大疆的机器人、机械狗、四足、人形、具身智能产品、量产、场景落地
  - name: 地缘政治国际关系
    description: 中美欧日印俄伊朗乌克兰以色列战争、关税、制裁、外交、冲突、产业脱钩、供应链博弈；
  - name: 金融市场宏观政策
    description: 美联储利率、汇率、通胀、就业、股债商品、全球流动性
  - name: 能源电力系统
    description: 光伏、太阳能、水电（雅鲁藏布江）、核能、新型电力系统建设
  - name: 航天深空探索
    description: SpaceX、登月、火星、飞船、卫星、空间站、商业航天技术产业化
  - name: 前沿科学技术
    description: 量子、脑机接口、基因工程科研突破与产业应用
advanced:
  debug: false
  version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version
  mcp_version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp
  configs_version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: http://127.0.0.1:10808
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ''
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: ━━━━━━━━━━━━━━━━
