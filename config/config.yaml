app:
  timezone: Asia/Shanghai
  show_version_update: true
schedule:
  enabled: true
  preset: morning_evening
platforms:
  enabled: true
  sources:
  - id: toutiao
    name: 今日头条
    expected_domain: toutiao.com
  - id: baidu
    name: 百度热搜
    expected_domain: baidu.com
  - id: wallstreetcn-hot
    name: 华尔街见闻
    expected_domain: wallstreetcn.com
  - id: thepaper
    name: 澎湃新闻
    expected_domain: thepaper.cn
  - id: bilibili-hot-search
    name: bilibili 热搜
    expected_domain: bilibili.com
  - id: cls-hot
    name: 财联社热门
    expected_domain: cls.cn
  - id: ifeng
    name: 凤凰网
    expected_domain: ifeng.com
  - id: tieba
    name: 贴吧
    expected_domain: baidu.com
  - id: weibo
    name: 微博
    expected_domain: weibo.com
  - id: douyin
    name: 抖音
    expected_domain: douyin.com
  - id: zhihu
    name: 知乎
    expected_domain: zhihu.com
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
  - id: hacker-news
    name: Hacker News
    url: https://hnrss.org/frontpage
  - id: ruanyifeng
    name: 阮一峰的网络日志
    url: http://www.ruanyifeng.com/blog/atom.xml
    enabled: false
  - id: yahoo-finance
    name: 雅虎财经
    url: https://finance.yahoo.com/news/rssindex
  - id: scmp
    name: 南华早报
    url: https://feedx.net/rss/scmp.xml
    enabled: true
  - id: asahi
    name: 朝日新闻
    url: http://rss.asahi.com/rss/asahi/newsheadlines.rdf
    enabled: true
  - id: BBC
    name: BBC
    url: http://feeds.bbci.co.uk/news/rss.xml
    enabled: true
  - id: nytimes
    name: 纽约时报
    url: https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml
    enabled: true
  - id: washingtonpost
    name: 华盛顿邮报
    url: http://feeds.washingtonpost.com/rss/world
    enabled: true
  - id: foxnews
    name: 福克斯新闻
    url: http://feeds.foxnews.com/foxnews/latest
    enabled: true
  - id: Github
    name: Github
    url: https://github.blog/feed/
  - id: Huggingface
    name: 抱抱脸
    url: https://huggingface.co/blog/feed.xml
  - id: RFI
    name: 法国国际广播
    url: https://feedx.net/rss/rfi.xml
    enabled: true
  - id: AI-Era
    name: 新智元
    url: https://plink.anyfeeder.com/weixin/AI_era
  - id: CNA
    name: 中央社
    url: https://rsshub.rssforever.com/cna
  - id: DeutscheWelle
    name: 德国之声
    url: https://rsshub.rssforever.com/dw/news
  - id: Reuters
    name: 路透社
    url: https://ir.thomsonreuters.com/rss/news-releases.xml
    enabled: true
  - id: economist
    name: 经济学人
    url: https://plink.anyfeeder.com/weixin/theeconomist
  - id: ltn
    name: 自由时报
    url: https://news.ltn.com.tw/rss/all.xml
    enabled: true
  - id: zaobao
    name: 联合早报
    url: https://plink.anyfeeder.com/zaobao/realtime/china
report:
  mode: current
  display_mode: keyword
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0
  max_news_per_source_per_keyword: 3
filter:
  method: ai
  priority_sort_enabled: true
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: prompt.txt
  extract_prompt_file: extract_prompt.txt
  update_tags_prompt_file: update_tags_prompt.txt
display:
  region_order:
  - new_items
  - hotlist
  - rss
  - standalone
  - ai_analysis
  regions:
    hotlist: true
    new_items: true
    rss: true
    standalone: true
    ai_analysis: true
  standalone:
    platforms:
    - wallstreetcn-hot
    rss_feeds:
    - hacker-news
    - yahoo-finance
    - scmp
    - asahi
    - BBC
    - nytimes
    - washingtonpost
    - foxnews
    - Github
    - Huggingface
    - RFI
    - AI-Era
    - CNA
    - DeutscheWelle
    - Reuters
    - economist
    - ltn
    - zaobao
    max_items: 5
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ''
    dingtalk:
      webhook_url: ''
    wework:
      webhook_url: ''
      msg_type: markdown
    telegram:
      bot_token: ''
      chat_id: ''
    email:
      from: ''
      password: ''
      to: ''
      smtp_server: ''
      smtp_port: ''
    ntfy:
      server_url: https://ntfy.sh
      topic: ''
      token: ''
    bark:
      url: ''
    slack:
      webhook_url: ''
    generic_webhook:
      webhook_url: ''
      payload_template: ''
storage:
  backend: auto
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: output
    retention_days: 0
  remote:
    endpoint_url: ''
    bucket_name: ''
    access_key_id: ''
    secret_access_key: ''
    region: ''
    retention_days: 0
  pull:
    enabled: false
    days: 7
ai:
  provider: openai
  model: MiniMax-M3
  api_key: YOUR_API_KEY_HERE
  api_base: https://api.minimaxi.com/v1
  timeout: 120
  temperature: 1
  max_tokens: 5000
  num_retries: 1
  fallback_models: []
  extra_params: {}
ai_analysis:
  enabled: true
  language: Chinese
  prompt_file: ai_analysis_prompt.txt
  mode: follow_report
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true
ai_translation:
  enabled: true
  language: 中文
  prompt_file: ai_translation_prompt.txt
  scope:
    hotlist: false
    rss: true
    standalone: true
tags:
  mode: manual
  items:
  - name: 科技巨头
    description: 与华为、腾讯、阿里巴巴、字节跳动、京东、鸿蒙、抖音、微信；苹果、微软、谷歌、Anthropic、OpenAI、google、deepmind等品牌或公司相关
  - name: 大模型 AI 产品
    description: 与OpenAI、anthropic、codex、Claude code、ChatGPT、Qwen、MiniMax、GLM 、DeepSeek、Kimi、MiMo、seedance等模型能力、智能体、openclaw、hermes、harness、CodeBuddy、千问、豆包、元宝、混元、模型推理成本、模型训练等品牌或公司或技术相关
  - name: 芯片半导体及云算力基础设施
    description: 与芯片、半导体、光刻机、先进封装、国产替代、关键材料设备、供应安全；英伟达、AMD、智能算力、韬定律、海思、昇腾、ARM、CUDA、Azure、智算中心等品牌或技术相关
  - name: 智能汽车自动驾驶
    description: 与比亚迪、鸿蒙智驾、问界、特斯拉、FSD、无人驾驶、智驾、刀片电池、云辇、吉利汽车、奇瑞汽车、宝马、奔驰、奥迪、丰田、理想汽车、小鹏汽车、蔚来汽车、宁德时代等品牌或公司或技术相关
  - name: 机器人具身智能
    description: 与宇树科技、智元机器人、众擎、大疆、无人机、机械狗、四足机器人、人形机器人、具身智能、世界模型等品牌或公司或技术相关
  - name: 地缘政治国际关系
    description: 与中美欧日印俄伊朗乌克兰以色列战争、关税、制裁、外交、冲突、产业脱钩、供应链博弈、宗教、意识形态、选举、军事动向、贸易壁垒、联合国、稀土等战略资源，大国博弈，地缘政治等主题相关
  - name: 金融市场宏观政策
    description: 与美联储、货币、美元、美债、黄金、贵金属、汇率、通胀、就业、股债商品、全球流动性、人民币国际化、货币互换、比特币、稳定币、石油贸易、国际期货、英镑、欧元、人民币、日元、支付体系等主题相关
  - name: 能源电力系统
    description: 与清洁能源、绿电、低碳、光伏、太阳能、水电、风电、核能、新型电力系统建设等主题相关
  - name: 航天深空探索
    description: 与中国航天、SpaceX、蓝色起源、火箭发射、北斗、GPS、登月、火星、飞船、卫星、空间站、商业航天技术产业化等主题相关
  - name: 前沿科学技术
    description: 与量子技术、脑机接口、新材料、医学突破、基因工程科研突破与产业应用等主题相关
  - name: 军事科技与装备
    description: 与军事科技、军工装备现代化、武器研发、军事通信技术、单兵装备、导弹、核武器、太空武器、战斗机、战斗机器人、航空母舰、六代机、陆军、海军、空军、空天军等主题相关
advanced:
  debug: false
  version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version
  mcp_version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp
  configs_version_check_url: https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs
  crawler:
    request_interval: 2000
    use_proxy: true
    default_proxy: http://127.0.0.1:10808
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: true
    proxy_url: http://172.25.128.1:1080
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: ━━━━━━━━━━━━━━━━
